name: Crypto Trading Bot

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: crypto-bot
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Libraries
        run: |
          python -m pip install --upgrade pip
          pip install ccxt requests

      - name: Run Bot
        run: python bot.py
