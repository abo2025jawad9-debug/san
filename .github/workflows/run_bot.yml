name: Crypto Trading Bot

on:
  schedule:
    - cron: '0 */4 * * *'   # كل 4 ساعات: 3 عمل + 1 راحة
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: crypto-bot
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Libraries
        run: |
          python -m pip install --upgrade pip
          pip install ccxt requests

      - name: Run Bot
        run: python bot.py

      - name: Save State
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "Update bot state [skip ci]"
          git push || echo "Nothing to commit"
